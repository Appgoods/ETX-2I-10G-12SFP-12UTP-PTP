<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>סטטוס היום</title>

  <style>
    body{
      margin:0;
      font-family:system-ui,-apple-system,"Segoe UI",Arial;
      background:#0b1220;
      color:#eaf0ff;
    }

    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:16px;
    }

    h1{
      font-size:18px;
      margin:6px 0 10px;
    }

    .pill{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      color:#a8b3cf;
      font-size:12px;
      margin-bottom:12px;
    }

    .row{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .card{
      flex:1;
      min-width:220px;
      background:rgba(17,26,46,.72);
      border:1px solid rgba(255,255,255,.12);
      border-radius:14px;
      padding:14px;
    }

    .k{
      color:#a8b3cf;
      font-size:13px;
    }

    .v{
      font-size:24px;
      font-weight:700;
      margin-top:6px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:14px;
    }

    th,td{
      padding:10px;
      border-bottom:1px solid rgba(255,255,255,.12);
      text-align:right;
