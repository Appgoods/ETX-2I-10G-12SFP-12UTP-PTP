<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>תיק מוצר</title>

  <style>
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Arial;background:#0b1220;color:#eaf0ff}
    header{padding:16px;border-bottom:1px solid rgba(255,255,255,.12)}
    h1{margin:0;font-size:20px}
    p{margin:8px 0 0;color:#a8b3cf;line-height:1.5}

    .actions{margin-top:12px;display:flex;gap:10px;flex-wrap:wrap}
    .btn{display:inline-flex;gap:8px;align-items:center;padding:10px 14px;border-radius:12px;
         border:1px solid rgba(74,163,255,.65);background:rgba(74,163,255,.16);
         color:#eaf0ff;text-decoration:none}

    .wrap{padding:14px 16px;max-width:1100px;margin:0 auto}
    h2{margin:18px 0 10px;font-size:16px}

    /* Videos */
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
    .card{background:rgba(17,26,46,.72);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:12px}
    video{width:100%;border-radius:12px;background:#000}

    /* Images */
    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:12px;
    }
    .thumb{
      display:block;
      text-decoration:none;
      color:inherit;
    }
    .gallery img{
      width:100%;
      aspect-ratio: 4 / 3;
      height:auto;
      object-fit: contain;
      background: rgba(255,255,255,.06);
      border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      padding:6px;
      cursor:pointer;
    }

    footer{border-top:1px solid rgba(255,255,255,.12);padding:14px 16px;color:#a8b3cf;text-align:center;font-size:13px}

    /* ===== Lightbox ===== */
    .lightbox{
      position:fixed; inset:0;
      display:none;
      z-index:9999;

      /* חשוב: כשהלייטבוקס סגור הוא לא חוסם קליקים/גלילה */
      pointer-events:none;
    }
    .lightbox.is-open{
      display:block;
      pointer-events:auto;
    }

    .lightbox__backdrop{
      position:absolute; inset:0;
      background:rgba(0,0,0,.72);
    }

    .lightbox__panel{
      position:absolute;
      inset: 24px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;

      max-width: 1200px;
      margin:auto;

      background: rgba(17,26,46,.88);
      border:1px solid rgba(255,255,255,.14);
      border-radius:16px;
      padding:14px;
      backdrop-filter: blur(6px);
    }

    .lightbox__img{
      max-width:100%;
      max-height: calc(100vh - 170px);
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background:#000;
      object-fit: contain;
    }

    .lightbox__caption{
      width:100%;
      color:#a8b3cf;
      font-size:13px;
      text-align:center;
      word-break: break-word;
    }

    .lightbox__close{
      position:absolute;
      top:10px;
      left:10px; /* RTL: נוח לשים סגירה בצד שמאל */
      width:38px; height:38px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      color:#eaf0ff;
      font-size:18px;
      cursor:pointer;
    }

    .lightbox__nav{
      position:absolute;
      top:50%;
      transform: translateY(-50%);
      width:44px; height:44px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      color:#eaf0ff;
      font-size:28px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .lightbox__prev{ right:12px; }  /* RTL: קודם בצד ימין */
    .lightbox__next{ left:12px; }   /* RTL: הבא בצד שמאל */

    .lightbox__nav:disabled{
      opacity:.35;
      cursor:not-allowed;
    }

    @media (max-width: 600px){
      .lightbox__panel{ inset: 12px; }
      .lightbox__img{ max-height: calc(100vh - 190px); }
    }
  </style>
</head>

<body>

<header>
  <h1 id="productName">טוען…</h1>
  <p id="productDescription"></p>

  <div class="actions" id="docsBtnsWrap" style="display:none;">
    <a id="drawingBtn" class="btn" target="_blank" rel="noopener noreferrer">📄 פתח שרטוט (PDF)</a>
    <a id="wiringBtn" class="btn" target="_blank" rel="noopener noreferrer">🔌 פתח שרטוט חיווט (PDF)</a>
  </div>

  <!-- Actions: Report + Status -->
  <div class="actions" id="opsBtnsWrap">
    <a id="reportBtn" class="btn" target="_blank" rel="noopener noreferrer">📝 דיווח ביצוע</a>
    <a id="statusBtn" class="btn" target="_blank" rel="noopener noreferrer">📊 סטטוס היום</a>
  </div>
</header>

<div class="wrap">
  <h2>וידאו</h2>
  <div id="videos" class="grid"></div>

  <h2>תמונות</h2>
  <div id="images" class="gallery"></div>
</div>

<footer>צפייה בלבד • אין כפתורי הורדה</footer>

<!-- Lightbox (Image Viewer) -->
<div id="lightbox" class="lightbox" aria-hidden="true">
  <div class="lightbox__backdrop"></div>

  <div class="lightbox__panel" role="dialog" aria-modal="true" aria-label="תצוגת תמונה">
    <button class="lightbox__close" type="button" aria-label="סגירה" title="סגירה (Esc)">✕</button>

    <button class="lightbox__nav lightbox__prev" type="button" aria-label="הקודם" title="קודם (→)">‹</button>
    <button class="lightbox__nav lightbox__next" type="button" aria-label="הבא" title="הבא (←)">›</button>

    <img id="lightboxImg" class="lightbox__img" alt="" />
    <div id="lightboxCaption" class="lightbox__caption"></div>
  </div>
</div>

<script>
  (function () {
    const DEFAULT_PRODUCT = "ETX-2I-10G 12SFP-12UTP-PTP";
    const params = new URLSearchParams(window.location.search);

    // אם אין ?p= נשתמש בברירת מחדל
    const p = (params.get("p") || DEFAULT_PRODUCT).trim();

    const reportBtn = document.getElementById("reportBtn");
    const statusBtn = document.getElementById("statusBtn");

    // מייצר לינקים תקינים עם קידוד לרווחים/תווים מיוחדים
    if (reportBtn) reportBtn.href = `report.html?p=${encodeURIComponent(p)}`;
    if (statusBtn) statusBtn.href = `status.html?p=${encodeURIComponent(p)}`;
  })();
</script>

<script src="app.js"></script>
</body>
</html>
