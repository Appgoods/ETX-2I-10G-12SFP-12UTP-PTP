<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>דיווח ביצוע</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Arial;background:#0b1220;color:#eaf0ff}
    .wrap{max-width:520px;margin:0 auto;padding:16px}
    h1{font-size:18px;margin:10px 0}
    label{display:block;margin:12px 0 6px;color:#a8b3cf}
    input{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:#0f1a2e;color:#eaf0ff}
    button{margin-top:14px;width:100%;padding:12px;border-radius:12px;border:1px solid rgba(74,163,255,.65);background:rgba(74,163,255,.16);color:#eaf0ff;font-weight:600}
    .msg{margin-top:12px;color:#a8b3cf;white-space:pre-wrap;word-break:break-word}
    .ok{color:#7CFFB2}
    .err{color:#FF8A8A}
    .pill{display:inline-block;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#a8b3cf;font-size:12px}
    .hint{margin-top:8px;color:#a8b3cf;font-size:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>דיווח ביצוע</h1>
    <div id="prod" class="pill">מוצר: …</div>

    <label>שם עובד</label>
    <input id="worker" placeholder="לדוגמה: דוד" />

    <label>כמה בוצע עכשיו?</label>
    <input id="qty" type="number" min="0" step="1" placeholder="לדוגמה: 5" />

    <button id="send">שלח</button>
    <div id="msg" class="msg"></div>
    <div class="hint">טיפ: אם יש שגיאה, יוצג כאן גם ה‑Response המלא (כדי שנדע בדיוק מה לתקן).</div>
  </div>

<script>
  // ✅ 1) Project URL
  const SUPABASE_URL = "https://lnhruihjqefatcicfdeo.supabase.co";

  // ✅ 2) Publishable (anon) key – בסדר לשימוש בצד לקוח
  const SUPABASE_ANON_KEY = "sb_publishable_0r590ZTtfde-eYBMgPpP2Q_euXd7xeX";

  const params = new URLSearchParams(location.search);

  // ✅ ברירת מחדל נכונה במקום "product"
  const DEFAULT_PRODUCT = "ETX-2I-10G 12SFP-12UTP-PTP";
  const productId = decodeURIComponent((params.get("p") || DEFAULT_PRODUCT)).trim();

  document.getElementById("prod").textContent = "מוצר: " + productId;

  const msg = document.getElementById("msg");
  function setMsg(text, cls){
    msg.className = "msg " + (cls||"");
    msg.textContent = text;
  }

  async function readResponseBody(res) {
    const raw = await res.text();
    try {
      const json = JSON.parse(raw);
      return { raw, json };
    } catch {
      return { raw, json: null };
    }
  }

  document.getElementById("send").addEventListener("click", async () => {
    const worker = document.getElementById("worker").value.trim();
    const qty = parseInt(document.getElementById("qty").value, 10);

    if (!worker) return setMsg("חסר שם עובד", "err");
    if (!Number.isFinite(qty) || qty <= 0) return setMsg("כמות לא תקינה", "err");

    if (!SUPABASE_URL || !SUPABASE_URL.startsWith("http")) {
      return setMsg("SUPABASE_URL לא תקין", "err");
    }
    if (!SUPABASE_ANON_KEY) {
      return setMsg("חסר ANON/PUBLISHABLE KEY (Project Settings → API)", "err");
    }

    setMsg("שולח…");

    const row = {
      product_id: productId,
      worker_name: worker,
      done_qty: qty,
      date_key: new Date().toISOString().slice(0,10) // YYYY-MM-DD
    };

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/production_log`, {
        method: "POST",
        headers: {
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
          "Content-Type": "application/json",
          "Prefer": "return=representation"
        },
        body: JSON.stringify(row)
      });

      const body = await readResponseBody(res);

      if (!res.ok) {
        const msgFromJson = body.json?.message || body.json?.error || body.json?.details || null;
        const nice = [
          `❌ שגיאה (HTTP ${res.status})`,
          msgFromJson ? `Message: ${msgFromJson}` : null,
          `Response body:`,
          body.raw || "(empty)"
        ].filter(Boolean).join("\n");
        throw new Error(nice);
      }

      setMsg("✅ נשלח בהצלחה", "ok");
      document.getElementById("qty").value = "";
    } catch (e) {
      setMsg(String(e.message || e), "err");
    }
  });
</script>
</body>
</html>
